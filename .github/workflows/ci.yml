name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run pytest
        working-directory: ./backend
        run: |
          pytest -q

  frontend-playwright:
    name: Frontend Playwright E2E
    runs-on: ubuntu-latest
    needs: python-tests
    services: {}
    steps:
      - uses: actions/checkout@v4

      - name: Start required Docker services
        run: |
          docker compose up -d postgres redis minio vault
          # wait for Postgres to accept connections
          for i in {1..30}; do \
            nc -z localhost 5432 && break || sleep 1; \
          done

      - name: Install backend deps (for migrations and running server)
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run DB migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://scccs:scccs_pass@localhost:5432/scccs_db
          FLASK_APP: run.py
        run: |
          flask db upgrade || echo 'migrations may have failed'

      - name: Start backend server
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://scccs:scccs_pass@localhost:5432/scccs_db
        run: |
          # start backend in background
          python run.py &
          # wait for backend port
          for i in {1..30}; do \
            nc -z localhost 5000 && break || sleep 1; \
          done

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: ./frontend
        run: |
          npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm run build

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: |
          npx playwright install --with-deps

      - name: Serve built frontend
        run: |
          npx http-server ./frontend/dist -p 5173 &

      - name: Run Playwright tests
        run: |
          npx playwright test tests/gpa.e2e.spec.ts --reporter=list
