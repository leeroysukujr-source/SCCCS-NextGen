<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCCCS NextGen - Advanced Collaboration Platform</title>
  <!-- Security Meta Tags -->
  <!-- Expanded CSP for Development: Allows http/ws for localhost APIs -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https: http: wss: ws: data: blob:; 
             script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://*.firebaseapp.com blob:; 
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
             font-src 'self' https://fonts.gstatic.com data:;
             connect-src 'self' https: http: wss: ws:;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    // Handle Vite preload errors (fixes "unable to preload css/js" errors after new deployments)
    window.addEventListener('vite:preloadError', (event) => {
      console.log('Vite preload error detected, reloading...', event.payload);
      // Avoid infinite reload loop: check if we already reloaded in the last 10 seconds
      const now = Date.now();
      const lastReload = parseInt(localStorage.getItem('last_preload_reload') || '0');
      if (now - lastReload > 10000) {
        localStorage.setItem('last_preload_reload', now.toString());
        window.location.reload();
      }
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
