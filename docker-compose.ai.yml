version: '3.8'

services:
  ai-service:
    build:
      context: ./backend/ai
      dockerfile: Dockerfile
    container_name: ai-features-service
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=gpt-3.5-turbo
      - AUTH_ENABLED=true
      - API_KEY=${AI_API_KEY:-your-secret-key-change-me}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,https://yourdomain.com
      - ALLOWED_HOSTS=localhost,yourdomain.com
      - RELOAD=false
    volumes:
      - ./backend/ai:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - meeting-network

  # Optional: Nginx reverse proxy (TLS termination)
  nginx:
    image: nginx:alpine
    container_name: ai-proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - ai-service
    networks:
      - meeting-network

networks:
  meeting-network:
    driver: bridge
