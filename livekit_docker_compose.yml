
services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    environment:
      LIVEKIT_KEYS: "devkey: 8f3b9d6a3c1e4f2b9a7c6d5e4f2b3a1c8d7e6f5a"
